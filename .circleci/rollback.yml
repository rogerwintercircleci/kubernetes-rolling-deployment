version: 2.1

jobs:
  rollback:
    docker:
      - image: cimg/base:stable
    environment:
      COMPONENT_NAME: << pipeline.deploy.component_name >>
      ENVIRONMENT_NAME: << pipeline.deploy.environment_name >>
      TARGET_VERSION: << pipeline.deploy.target_version >>
    steps:
      - run:
          name: Install kubectl
          command: |
            KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
            curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl
      - run:
          name: Configure kubeconfig
          command: |
            mkdir -p ~/.kube
            echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
            chmod 600 ~/.kube/config
      - run:
          name: Plan rollback release
          command: |
            circleci run release plan \
              --component-name=$COMPONENT_NAME \
              --environment-name=$ENVIRONMENT_NAME \
              --target-version=$TARGET_VERSION \
              --rollback
      - run:
          name: Roll back deployment
          command: kubectl rollout undo deployment/rolling-tutorial-app
      - run:
          name: Monitor rollback rollout
          command: kubectl rollout status deployment/rolling-tutorial-app --timeout=5m
      - run:
          name: Mark rollback as SUCCESS
          command: circleci run release update --status=SUCCESS
          when: on_success
      - run:
          name: Mark rollback as FAILED
          command: circleci run release update --status=FAILED
          when: on_fail

  cancel-rollback:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Mark rollback as CANCELED
          command: circleci run release update --status=CANCELED

workflows:
  rollback:
    jobs:
      - rollback:
          context: rolling-tutorial
      - cancel-rollback:
          context: rolling-tutorial
          requires:
            - rollback:
              - canceled
